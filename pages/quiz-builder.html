<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo bài test</title>
    <link rel="icon" href="/assets/images/vibrant-quiz-game-show-vector-illustration_1308-181014.avif" type="image/x-icon">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/css/quiz-builder.css">
</head>

<body>
    <header>
        <a href="/pages/dashboard.html" class="logo">QuizzForge</a>
        <nav class="header-nav">
            <a href="/pages/category-manager.html">Danh mục</a>
            <a href="/pages/product-manager.html" class="active">Bài test</a>
            <a href="/pages/login.html" onclick="logout()">Đăng xuất</a>
        </nav>
    </header>

    <main>
        <div class="header-main">
            <h2 id="pageTitle">Tạo bài test</h2>
        </div>

        <div class="form-container">
            <!-- Thông tin cơ bản -->
            <div class="form-group">
                <label for="testName">Tên bài test</label>
                <input type="text" id="testName" placeholder="Điền tên bài test">
                <span class="error-text" id="nameError"></span>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label for="testCategory">Danh mục</label>
                    <select id="testCategory">
                        <option value="">Chọn danh mục</option>
                    </select>
                    <span class="error-text" id="categoryError"></span>
                </div>
                <div class="form-col">
                    <label for="testTime">Thời gian (phút)</label>
                    <input type="number" id="testTime" value="15" min="1" max="120">
                    <span class="error-text" id="timeError"></span>
                </div>
            </div>

            <!-- Quản lý câu hỏi -->
            <div class="section-header">
                <div class="section-title">
                    <h3>Quản lý câu hỏi</h3>
                    <span class="error-text" id="questionListError"></span>
                </div>
                <div class="section-actions">
                    <button class="btn-add-question" id="btnAddQuestion">Thêm câu hỏi mới</button>
                    <button class="btn-save-test" id="btnSaveQuiz">Lưu</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 60px;">ID</th>
                            <th>Câu hỏi</th>
                            <th style="width: 160px; text-align: center;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="questionTableBody">
                        <!-- Dữ liệu được render từ JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Thêm/Sửa Câu hỏi (Dùng modal.css) -->
    <div class="modal-overlay" id="questionModal">
        <div class="modal-container modal-lg">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm/sửa câu hỏi</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Câu hỏi</label>
                    <input type="text" id="questionContent" placeholder="Nhập câu hỏi">
                    <span class="error-text" id="qContentError"></span>
                </div>
                
                <div class="answer-section">
                    <label>Câu trả lời</label>
                    <div id="answersList">
                        <!-- Đáp án render ở đây -->
                    </div>
                    <span class="error-text" id="qAnswersError"></span>
                    <button type="button" class="btn-add-answer" id="btnAddAnswer">Thêm câu trả lời</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel">Huỷ</button>
                <button class="btn btn-save" id="btnSaveQuestion">Lưu</button>
            </div>
        </div>
    </div>

    <!-- Modal Xác nhận xóa (Dùng modal.css) -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-container">
            <div class="modal-header text-center">
                <h2>Xác nhận xóa</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p>Bạn có chắc chắn muốn xóa câu hỏi này không? Hành động này không thể hoàn tác.</p>
            </div>
            <div class="modal-footer justify-center">
                <button class="btn btn-cancel">Huỷ</button>
                <button class="btn btn-delete" id="btnConfirmDelete">Xóa</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Quiz App. All rights reserved.</p>
    </footer>
    <script src="/js/quiz-builder.js"></script>
</body>

</html>
