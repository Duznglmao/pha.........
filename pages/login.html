<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang đăng nhập</title>
    <link rel="icon" href="/assets/images/vibrant-quiz-game-show-vector-illustration_1308-181014.avif" type="image/x-icon">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>
    <header>
        <h1>Đăng nhập</h1>
        <p>QuizForge - Nền tảng sáng tạo bài kiểm tra trực tuyến, giúp bạn dễ dàng
            thiết kế, chia sẻ và thực hiện các bài kiểm tra một cách nhanh chóng và hiệu quả
        </p>
    </header>

    <main>
        <form action="" id="formLogin">
            <label for="userEmail">Email</label>
            <input type="email" id="userEmail" placeholder="Địa chỉ email">
            <p class="error-email">Vui lòng nhập địa chỉ email</p>
            <br>
            <label for="userPassword">Password</label>
            <input type="password" id="userPassword" placeholder="Mật khẩu">
            <p class="error-password">Vui lòng nhập mật khẩu</p>

            <button id="loginButton" type="submit">Đăng nhập</button>

            <p>Chưa có tài khoản? <a href="/pages/register.html">Đăng ký</a></p>
        </form>
    </main>

    <script src="/js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
