<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bài test</title>
    <link rel="icon" href="/assets/images/istockphoto-1616906708-612x612.jpg" type="image/x-icon">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/product-manager.css">
    <link rel="stylesheet" href="/css/modal.css">
</head>

<body>
    <header>
        <a href="/pages/dashboard.html" class="logo">QuizzForge</a>
        <nav class="header-nav">
            <a href="/pages/category-manager.html">Danh mục</a>
            <a href="/pages/product-manager.html" class="active">Bài test</a>
            <a href="/pages/login.html" class="btn-logout" onclick="logout()">Đăng xuất</a>
        </nav>
    </header>

    <main>
        <h2>Quản lý bài test</h2>
        <div class="toolbar">
            <button class="btn-add" id="btnAddTest" onclick="changePage()">Thêm bài test</button>
            <div class="toolbar-right">
                <select class="select-sort" id="sortSelect">
                    <option value="">Sắp xếp theo</option>
                    <option value="name-asc">Tên A → Z</option>
                    <option value="name-desc">Tên Z → A</option>
                    <option value="time-asc">Thời gian tăng dần</option>
                    <option value="time-desc">Thời gian giảm dần</option>
                </select>
                <input type="text" class="input-search" id="searchInput" placeholder="Tìm kiếm theo tên">
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên bài test</th>
                        <th>Danh mục</th>
                        <th>Số câu hỏi</th>
                        <th>Thời gian</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="testTableBody">
                 
                </tbody>
            </table>
        </div>

        <div class="pagination"></div>
    </main>

    <div class="modal-overlay" id="quizDeleteModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2>Xác nhận xóa</h2>
                <button class="close-btn">&times;</button>
            </div>

            <div class="modal-body">
                <p>Bạn chắc chắn muốn xóa bài test này?</p>
            </div>

            <div class="modal-footer">
                <button class="btn btn-cancel">Huỷ</button>
                <button class="btn btn-delete" id="deleteQuizBtn">Xoá</button>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2025 Quiz App. All rights reserved.</p>
    </footer>

    <script src="/js/product-manager.js"></script>
</body>

</html>
