    <!-- popup chỉnh sửa -->
    <div class="modal-overlay" id="categoryEditModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2>Thêm/sửa danh mục</h2>
                <button class="close-btn">&times;</button>
            </div>

            <div class="modal-body">
                <div class="input-group">
                    <label for="category-name">Tên danh mục</label>
                    <input type="text" id="category-name" placeholder="Ví dụ: Đời sống">
                    <span class="error-text" style="display:none;">Tên danh mục đã tồn tại</span>
                </div>

                <div class="input-group">
                    <label for="emoji">Emoji</label>
                    <input type="text" id="emoji" placeholder="Ví dụ: 🏠">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-cancel">Huỷ</button>
                <button class="btn btn-save" id="saveCategoryBtn">Lưu</button>
            </div>
        </div>
    </div>

    <!-- popup xóa -->
