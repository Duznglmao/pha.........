<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>
    <link rel="icon" href="/assets/images/vibrant-quiz-game-show-vector-illustration_1308-181014.avif" type="image/x-icon">

<body>

            <a href="/pages/dashboard.html">Trang chủ</a>
            <a href="/pages/login.html" onclick="logout()">Đăng xuất</a>

            <button class="active">Lượt chơi tăng dần</button>
            <button>Lượt chơi giảm dần</button>

        <div class="card-container"></div>
